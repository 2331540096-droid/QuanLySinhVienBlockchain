<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Degrees - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div class="min-h-screen flex flex-col">
        <!-- Navigation -->
        <nav class="bg-white border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <h1 class="text-lg font-bold text-slate-800">Admin Panel</h1>
                <div class="flex items-center space-x-8">
                    <a href="dashboard.html" class="text-slate-600 hover:text-slate-900 font-medium text-sm transition">Dashboard</a>
                    <a href="students.html" class="text-slate-600 hover:text-slate-900 font-medium text-sm transition">Sinh Viên</a>
                    <a href="grades.html" class="text-slate-600 hover:text-slate-900 font-medium text-sm transition">Điểm Số</a>
                    <a href="degrees.html" class="text-slate-900 font-medium text-sm border-b-2 border-purple-600 pb-1">Bằng Cấp</a>
                    <button onclick="logout()" class="bg-sky-600 text-white px-5 py-2 rounded-lg hover:bg-sky-700 font-medium text-sm transition">Đăng Xuất</button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="max-w-7xl mx-auto px-6 py-12">
            <div class="max-w-6xl mx-auto">
                <h2 class="text-3xl font-bold text-slate-900 mb-8">Quản lý Bằng cấp</h2>

                <!-- Form cấp bằng -->
                <div class="bg-white p-6 rounded-lg shadow-md mb-8">
                    <h3 class="text-xl font-semibold text-gray-800 mb-4">Cấp Bằng</h3>
                    <p class="text-gray-600 text-sm mb-4">
                        💡 <strong>Mã số bằng sẽ tự động tạo (8 chữ số random)</strong> - Bạn sẽ nhận được mã này ngay sau khi cấp bằng thành công
                    </p>
                    <form id="issueDegreeForm">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="degreeStudentId" class="block text-gray-700 font-medium mb-2">Mã số Sinh viên</label>
                                <input type="number" id="degreeStudentId" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                            <div>
                                <label for="degreeType" class="block text-gray-700 font-medium mb-2">Loại Bằng</label>
                                <input type="text" id="degreeType" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                            <div class="md:col-span-2">
                                <label for="issuingOrganization" class="block text-gray-700 font-medium mb-2">Tổ chức Cấp bằng</label>
                                <input type="text" id="issuingOrganization" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                        </div>
                        <div class="flex space-x-2 mt-4">
                            <button type="submit" class="bg-purple-500 text-white px-6 py-2 rounded hover:bg-purple-600">Cấp Bằng</button>
                            <button type="button" onclick="showRecentDegrees()" class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600" title="Xem các bằng vừa cấp gần đây">📋 Lịch sử cấp gần đây</button>
                        </div>
                    </form>
                </div>

                <!-- Thu hồi bằng - REMOVED -->

                <!-- Xem bằng -->
                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h3 class="text-xl font-semibold text-gray-800 mb-4">Xem Bằng Sinh viên</h3>
                    <form id="viewDegreesForm" class="mb-4">
                        <div class="flex space-x-4">
                            <div>
                                <label for="viewDegreeStudentId" class="block text-gray-700 font-medium mb-2">Mã số Sinh viên</label>
                                <input type="number" id="viewDegreeStudentId" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                            <button type="submit" class="self-end bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600">Xem Bằng</button>
                        </div>
                    </form>
                    <div id="degreesTable"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="bg-slate-900 text-slate-400 py-6 border-t border-slate-800 mt-12">
            <div class="max-w-7xl mx-auto px-6 text-center text-sm">
                <p>&copy; 2026 Blockchain Student Management System - Admin Panel</p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/web3.js"></script>
    <script src="../js/contract.js"></script>
    <script src="../js/app.js"></script>
    <script>
        // Auto-connect wallet and load admin address
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Degrees page loaded, initializing...');
            
            // Khởi tạo Web3
            initWeb3();
            
            // Setup session từ wallet connected
            autoConnectWallet();
            loadAdminAddress();
            
            // Sau đó mới check quyền admin
            setTimeout(function() {
                console.log('Checking admin access...');
                protectAdminPage();
            }, 500);
        });
    </script>
</body>
</html>
