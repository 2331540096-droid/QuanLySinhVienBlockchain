<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grades - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div class="min-h-screen flex flex-col">
        <!-- Navigation -->
        <nav class="bg-white border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <h1 class="text-lg font-bold text-slate-800">Admin Panel</h1>
                <div class="flex items-center space-x-8">
                    <a href="dashboard.html" class="text-slate-600 hover:text-slate-900 font-medium text-sm transition">Dashboard</a>
                    <a href="students.html" class="text-slate-600 hover:text-slate-900 font-medium text-sm transition">Sinh Viên</a>
                    <a href="grades.html" class="text-slate-900 font-medium text-sm border-b-2 border-emerald-600 pb-1">Điểm Số</a>
                    <a href="degrees.html" class="text-slate-600 hover:text-slate-900 font-medium text-sm transition">Bằng Cấp</a>
                    <button onclick="logout()" class="bg-sky-600 text-white px-5 py-2 rounded-lg hover:bg-sky-700 font-medium text-sm transition">Đăng Xuất</button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="max-w-7xl mx-auto px-6 py-12">
            <div class="max-w-6xl mx-auto">
                <h2 class="text-3xl font-bold text-slate-900 mb-8">Quản lý Điểm số</h2>

                <!-- Form thêm điểm -->
                <div class="bg-white p-6 rounded-lg shadow-md mb-8">
                    <h3 class="text-xl font-semibold text-gray-800 mb-4">Thêm Điểm</h3>
                    <form id="addGradeForm">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="gradeStudentId" class="block text-gray-700 font-medium mb-2">Mã số Sinh viên</label>
                                <input type="number" id="gradeStudentId" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                            <div>
                                <label for="subjectName" class="block text-gray-700 font-medium mb-2">Tên Môn học</label>
                                <input type="text" id="subjectName" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                            <div>
                                <label for="semester" class="block text-gray-700 font-medium mb-2">Học kỳ</label>
                                <input type="text" id="semester" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                            <div>
                                <label for="score" class="block text-gray-700 font-medium mb-2">Điểm số</label>
                                <input type="number" id="score" min="0" max="100" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                        </div>
                        <button type="submit" class="mt-4 bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600">Thêm Điểm</button>
                    </form>
                </div>

                <!-- Xem điểm -->
                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h3 class="text-xl font-semibold text-gray-800 mb-4">Xem Điểm Sinh viên</h3>
                    <form id="viewGradesForm" class="mb-4">
                        <div class="flex space-x-4">
                            <div>
                                <label for="viewStudentId" class="block text-gray-700 font-medium mb-2">Mã số Sinh viên</label>
                                <input type="number" id="viewStudentId" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>
                            <button type="submit" class="self-end bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600">Xem Điểm</button>
                        </div>
                    </form>
                    <div id="gradesTable"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="bg-slate-900 text-slate-400 py-6 border-t border-slate-800 mt-12">
            <div class="max-w-7xl mx-auto px-6 text-center text-sm">
                <p>&copy; 2026 Blockchain Student Management System - Admin Panel</p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/web3.js"></script>
    <script src="../js/contract.js"></script>
    <script src="../js/app.js"></script>
    <script>
        // Auto-connect wallet and load admin address
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Grades page loaded, initializing...');
            
            // Khởi tạo Web3
            initWeb3();
            
            // Setup session từ wallet connected
            autoConnectWallet();
            loadAdminAddress();
            
            // Sau đó mới check quyền admin
            setTimeout(function() {
                console.log('Checking admin access...');
                protectAdminPage();
            }, 500);
        });
    </script>
</body>
</html>
