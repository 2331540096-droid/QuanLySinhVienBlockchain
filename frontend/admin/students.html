<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div class="min-h-screen flex flex-col">
        <!-- Navigation -->
        <nav class="bg-white border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <h1 class="text-lg font-bold text-slate-800">Admin Panel</h1>
                <div class="flex items-center space-x-8">
                    <a href="dashboard.html" class="text-slate-600 hover:text-slate-900 font-medium text-sm transition">Dashboard</a>
                    <a href="students.html" class="text-slate-900 font-medium text-sm border-b-2 border-sky-600 pb-1">Sinh Viên</a>
                    <a href="grades.html" class="text-slate-600 hover:text-slate-900 font-medium text-sm transition">Điểm Số</a>
                    <a href="degrees.html" class="text-slate-600 hover:text-slate-900 font-medium text-sm transition">Bằng Cấp</a>
                    <button onclick="logout()" class="bg-sky-600 text-white px-5 py-2 rounded-lg hover:bg-sky-700 font-medium text-sm transition">Đăng Xuất</button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="max-w-7xl mx-auto px-6 py-12">
            <div class="max-w-6xl mx-auto">
                <h2 class="text-3xl font-bold text-slate-900 mb-8">Quản lý Sinh viên</h2>

                                <!-- Alert thành công/lỗi -->
                                <div id="alertBox" class="hidden mb-4"></div>

                                <!-- Form thêm sinh viên -->
                                <div class="bg-white p-6 rounded-lg shadow-md mb-8">
                                        <h3 class="text-xl font-semibold text-gray-800 mb-4">Thêm Sinh viên Mới</h3>
                                        <form id="addStudentForm">
                                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        <div>
                                                                <label for="studentId" class="block text-gray-700 font-medium mb-2">Mã số Sinh viên</label>
                                                                <input type="number" id="studentId" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                                                        </div>
                                                        <div>
                                                                <label for="fullName" class="block text-gray-700 font-medium mb-2">Họ và Tên</label>
                                                                <input type="text" id="fullName" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                                                        </div>
                                                        <div>
                                                                <label for="dateOfBirth" class="block text-gray-700 font-medium mb-2">Ngày Sinh</label>
                                                                <input type="date" id="dateOfBirth" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                                                        </div>
                                                        <div>
                                                                <label for="course" class="block text-gray-700 font-medium mb-2">Ngành học/Chương trình</label>
                                                                <input type="text" id="course" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                                                        </div>
                                                        <div>
                                                                <label for="enrollmentYear" class="block text-gray-700 font-medium mb-2">Năm Nhập học</label>
                                                                <input type="number" id="enrollmentYear" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                                                        </div>
                                                        <div>
                                                                <label for="walletAddress" class="block text-gray-700 font-medium mb-2">Địa chỉ Ví</label>
                                                                <input type="text" id="walletAddress" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                                                        </div>
                                                </div>
                                                <button type="submit" class="mt-4 bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600">Thêm Sinh viên</button>
                                        </form>
                                </div>

                                <!-- Modal cập nhật sinh viên -->
                                <div id="updateModal" class="fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-50 hidden">
                                    <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-md">
                                        <h3 class="text-xl font-semibold text-gray-800 mb-4">Cập nhật thông tin Sinh viên</h3>
                                        <form id="updateStudentForm">
                                            <input type="hidden" id="updateStudentId">
                                            <div class="mb-4">
                                                <label for="updateFullName" class="block text-gray-700 font-medium mb-2">Họ và Tên</label>
                                                <input type="text" id="updateFullName" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                                            </div>
                                            <div class="mb-4">
                                                <label for="updateDateOfBirth" class="block text-gray-700 font-medium mb-2">Ngày Sinh</label>
                                                <input type="date" id="updateDateOfBirth" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                                            </div>
                                            <div class="mb-4">
                                                <label for="updateCourse" class="block text-gray-700 font-medium mb-2">Ngành học/Chương trình</label>
                                                <input type="text" id="updateCourse" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                                            </div>
                                            <div class="mb-4">
                                                <label for="updateEnrollmentYear" class="block text-gray-700 font-medium mb-2">Năm Nhập học</label>
                                                <input type="number" id="updateEnrollmentYear" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                                            </div>
                                            <div class="mb-4">
                                                <label for="updateWalletAddress" class="block text-gray-700 font-medium mb-2">Địa chỉ Ví</label>
                                                <input type="text" id="updateWalletAddress" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                                            </div>
                                            <div class="flex justify-end">
                                                <button type="button" id="closeModalBtn" class="mr-2 bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">Hủy</button>
                                                <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Cập nhật</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>

                                <!-- Danh sách sinh viên -->
                                <div class="bg-white p-6 rounded-lg shadow-md">
                                        <h3 class="text-xl font-semibold text-gray-800 mb-4">Danh sách Sinh viên</h3>
                                        <button id="loadStudents" class="mb-4 bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Tải Danh sách</button>
                                        <div id="studentsTable">
                                            <!-- Bảng sinh viên sẽ được render bằng JS -->
                                        </div>
                                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="bg-slate-900 text-slate-400 py-6 border-t border-slate-800 mt-12">
            <div class="max-w-7xl mx-auto px-6 text-center text-sm">
                <p>&copy; 2026 Blockchain Student Management System - Admin Panel</p>
            </div>
        </footer>
    </div>

        <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
        <script src="../js/auth.js"></script>
        <script src="../js/web3.js"></script>
        <script src="../js/contract.js"></script>
        <script src="../js/app.js"></script>
        <script>
            // Auto-connect wallet and load admin address
            document.addEventListener('DOMContentLoaded', function() {
                console.log('Students page loaded, initializing...');
                
                // Khởi tạo Web3
                initWeb3();
                
                // Setup session từ wallet connected
                autoConnectWallet();
                loadAdminAddress();
                
                // Sau đó mới check quyền admin
                setTimeout(function() {
                    console.log('Checking admin access...');
                    protectAdminPage();
                }, 500);
            });
        </script>
</body>
</html>
